<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>前鎮區 × 環保局｜1999 派工案件</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<meta name="apple-mobile-web-app-title" content="前鎮1999">
<meta name="application-name" content="前鎮1999">
<meta name="theme-color" content="#2C4E52">
<style>
  :root{
    --ink:#182A2E;
    --ink-soft:#54686C;
    --ink-faint:#84989B;
    --line-soft:rgba(255,255,255,.5);
    --harbor:#3A6B78;
    --harbor-deep:#1E3A42;
    --mint:#4C8C82;
    --mint-ink:#2F5F58;
    --ok:#4C8562;
    --doing:#A67D3D;
    --other:#5C6E72;

    /* 玻璃材質 token */
    --glass-bg:rgba(255,255,255,.66);
    --glass-bg-strong:rgba(255,255,255,.8);
    --glass-border:rgba(255,255,255,.55);
    --glass-shadow:0 12px 32px -16px rgba(15,30,36,.32), 0 2px 6px rgba(15,30,36,.08);
    --glass-inset:inset 0 1px 0 rgba(255,255,255,.7), inset 0 0 0 1px rgba(255,255,255,.14);
    --blur:blur(22px) saturate(140%);

    --r-lg:22px;
    --r-md:16px;
    --r-sm:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}

  /* ---------- 背景：低飽和霧面漸層，安靜地當玻璃的底 ---------- */
  body{
    font-family:-apple-system,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    color:var(--ink);
    line-height:1.6;
    padding-bottom:56px;
    -webkit-tap-highlight-color:transparent;
    position:relative;
    isolation:isolate;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;
    background:
      radial-gradient(circle at 14% 12%, rgba(76,140,130,.28), transparent 46%),
      radial-gradient(circle at 88% 10%, rgba(58,107,120,.24), transparent 48%),
      radial-gradient(circle at 80% 82%, rgba(30,58,66,.4), transparent 55%),
      radial-gradient(circle at 14% 84%, rgba(70,110,100,.22), transparent 52%),
      linear-gradient(165deg,#22343A 0%,#2C4E52 48%,#33564F 100%);
    animation:drift 30s ease-in-out infinite alternate;
  }
  @keyframes drift{
    0%{transform:scale(1) translate(0,0)}
    100%{transform:scale(1.05) translate(-1.2%, 1.2%)}
  }

  /* ---------- Header：直接坐在漸層上，不另外鋪底色 ---------- */
  header{color:#fff;padding:26px 20px 20px;position:relative}
  .wrap{max-width:720px;margin:0 auto;position:relative}
  .eyebrow{font-size:11px;letter-spacing:.2em;opacity:.72;text-transform:uppercase;margin-bottom:6px;font-weight:600}
  h1{font-size:23px;font-weight:800;letter-spacing:.01em;text-shadow:0 1px 12px rgba(0,0,0,.15)}
  h1 .x{opacity:.55;font-weight:400;margin:0 7px}
  .sub{font-size:13px;opacity:.85;margin-top:5px}

  /* ---------- 玻璃卡片通用樣式 ---------- */
  .toolbar-card,.stat,.case,.state{
    background:var(--glass-bg);
    -webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);
    border:1px solid var(--glass-border);
    box-shadow:var(--glass-shadow),var(--glass-inset);
  }
  @supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
    .toolbar-card,.stat,.case,.state{background:rgba(255,255,255,.92)}
  }

  /* ---------- Toolbar ---------- */
  .toolbar{max-width:720px;margin:6px auto 0;padding:0 14px}
  .toolbar-card{border-radius:var(--r-lg);padding:16px}
  .filter-label{font-size:11.5px;color:var(--ink-soft);margin-bottom:8px;font-weight:600;letter-spacing:.03em}
  .filter-row{display:flex;gap:8px}
  .chip{
    flex:1;border:1px solid rgba(255,255,255,.7);background:rgba(255,255,255,.35);color:var(--ink-soft);
    border-radius:var(--r-md);padding:9px 0;font-size:14px;cursor:pointer;font-weight:600;
    display:flex;align-items:center;justify-content:center;gap:6px;
    transition:background .15s,border-color .15s,color .15s;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.6);
  }
  .chip .dot{width:7px;height:7px;border-radius:50%;background:rgba(76,100,105,.4);transition:background .15s;flex-shrink:0}
  .chip::after{content:"";width:7px;flex-shrink:0}
  .chip[aria-pressed="true"]{
    background:rgba(76,140,130,.24);border-color:rgba(76,140,130,.5);color:var(--mint-ink);
  }
  .chip[aria-pressed="true"] .dot{background:var(--mint)}
  .date-row{
    display:flex;flex-wrap:wrap;gap:8px;align-items:center;
    margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.55);
  }
  .date-row input[type="date"]{
    border:1px solid rgba(255,255,255,.7);border-radius:var(--r-sm);padding:8px 8px;
    font-size:13.5px;font-family:inherit;color:var(--ink);background:rgba(255,255,255,.5);
    flex:1;min-width:126px;
  }
  .date-row .tilde{color:var(--ink-faint);font-size:13px}
  .quick-row{display:flex;gap:6px;margin-top:10px}
  .quick{
    flex:1;border:1px solid rgba(255,255,255,.7);background:rgba(255,255,255,.35);color:var(--ink-soft);
    border-radius:var(--r-sm);padding:7px 0;font-size:12.5px;cursor:pointer;text-align:center;font-weight:600;
  }
  .quick:active{background:rgba(255,255,255,.6)}
  .btn-search{
    display:flex;align-items:center;justify-content:center;gap:8px;
    width:100%;margin-top:14px;position:relative;overflow:hidden;
    background:linear-gradient(155deg,var(--harbor) 0%,var(--harbor-deep) 100%);
    color:#fff;border:none;border-radius:var(--r-md);
    padding:13px 0;font-size:16px;font-weight:700;
    cursor:pointer;box-shadow:0 8px 20px -6px rgba(30,58,66,.4),inset 0 1px 0 rgba(255,255,255,.35);
  }
  .btn-search::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(255,255,255,.28),rgba(255,255,255,0) 55%);
    pointer-events:none;
  }
  .btn-search:active{transform:translateY(1px);box-shadow:0 4px 10px -4px rgba(30,58,66,.4)}
  .btn-search:disabled{opacity:.5;cursor:default}
  .btn{
    background:var(--harbor);color:#fff;border:none;border-radius:var(--r-sm);
    padding:9px 16px;font-size:13.5px;font-weight:600;cursor:pointer;
  }
  .btn.ghost{
    background:rgba(255,255,255,.5);color:var(--harbor-deep);border:1px solid rgba(255,255,255,.8);
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
  }
  .chip:focus-visible,.btn:focus-visible,.quick:focus-visible,.btn-search:focus-visible,
  .date-row input:focus-visible{outline:3px solid #BFEFEA;outline-offset:2px}
  .hint{font-size:11.5px;color:var(--ink-soft);margin-top:10px;line-height:1.5}
  .hint.err{color:#B23A0F;font-weight:600}

  /* ---------- Summary ---------- */
  .summary{
    max-width:720px;margin:14px auto 0;padding:0 14px;
    display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  }
  .stat{border-radius:var(--r-md);padding:12px 8px;text-align:center}
  .stat b{display:block;font-size:23px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.3;color:var(--ink)}
  .stat span{font-size:11.5px;color:var(--ink-soft);font-weight:600}
  .stat.doing b{color:var(--doing)}
  .stat.ok b{color:var(--ok)}

  main{max-width:720px;margin:16px auto 0;padding:0 14px}
  .meta-line{font-size:11.5px;color:#EAF0EE;margin:0 2px 10px;line-height:1.5;text-shadow:0 1px 6px rgba(0,0,0,.18)}

  /* ---------- Case card ---------- */
  .case{border-radius:var(--r-lg);padding:15px 16px;margin-bottom:10px;cursor:pointer}
  .case:nth-child(odd){background:rgba(255,255,255,.74)}
  .case:nth-child(even){background:rgba(190,213,205,.55)}
  .case-head{display:flex;align-items:center;gap:8px}
  .badge{
    font-size:11.5px;font-weight:700;border-radius:999px;padding:4px 11px;white-space:nowrap;
    display:inline-flex;align-items:center;gap:5px;border:1px solid transparent;
  }
  .badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  .badge.doing{background:rgba(166,125,61,.16);color:var(--doing);border-color:rgba(166,125,61,.3)}
  .badge.ok{background:rgba(76,133,98,.16);color:var(--ok);border-color:rgba(76,133,98,.3)}
  .badge.other{background:rgba(92,110,114,.16);color:var(--other);border-color:rgba(92,110,114,.26)}
  .case-no{
    font-size:11.5px;color:var(--ink-faint);font-variant-numeric:tabular-nums;
    white-space:nowrap;flex:1;text-align:right;
  }
  .cno-pre{opacity:.75}
  .cno-tail{color:var(--ink-soft);font-weight:700;letter-spacing:.02em}
  .expand-btn{
    width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.45);
    border:1px solid rgba(255,255,255,.7);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    color:var(--ink-soft);font-size:11px;transition:transform .2s;
  }
  .case.open .expand-btn{transform:rotate(180deg);background:rgba(76,140,130,.24);color:var(--mint-ink);border-color:rgba(76,140,130,.4)}

  .case-preview{margin-top:10px}
  .case.open .case-preview{display:none}
  .case .desc{font-size:15px;font-weight:500;line-height:1.65;color:var(--ink);overflow-wrap:anywhere}
  .case .meta-row{
    margin-top:8px;font-size:12.5px;color:var(--ink-faint);
    display:flex;flex-wrap:wrap;gap:4px 0;overflow-wrap:anywhere;
  }
  .case .meta-row span:not(:last-child)::after{content:"  ·  ";color:rgba(76,100,105,.4)}

  /* ---------- Detail ---------- */
  .case-detail{display:none;margin-top:2px}
  .case.open .case-detail{display:block}

  .copy-all{
    display:flex;align-items:center;justify-content:center;gap:7px;
    width:100%;margin:16px 0 2px;
    background:transparent;color:var(--mint-ink);border:1.5px solid rgba(76,140,130,.45);
    border-radius:var(--r-md);padding:11px 0;font-size:14px;font-weight:700;
    cursor:pointer;font-family:inherit;
  }
  .copy-all:active{background:rgba(76,140,130,.14)}
  .copy-all.copied{background:rgba(76,133,98,.16);border-color:rgba(76,133,98,.5);color:var(--ok)}
  .copy-divider{border-top:1px solid rgba(15,35,38,.14);margin-top:14px}

  .field-grid{
    display:grid;grid-template-columns:1fr 1fr;
    border-top:1px solid rgba(15,35,38,.14);
  }
  .field{padding:10px 2px;border-bottom:1px solid rgba(15,35,38,.1)}
  .field.full{grid-column:1 / -1}
  .field-k{font-size:10.5px;color:var(--ink);font-weight:700;letter-spacing:.06em;text-transform:uppercase}
  .field-v{font-size:14px;color:var(--ink);margin-top:3px;overflow-wrap:anywhere;line-height:1.5}

  .quote-block{
    margin:12px 0 4px;padding:13px 14px 13px 16px;border-radius:var(--r-md);
    background:linear-gradient(to right, var(--mint) 0 3px, rgba(76,140,130,.15) 3px 100%);
    font-size:14.5px;line-height:1.75;color:#233E3A;overflow-wrap:anywhere;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.4);
  }
  .quote-block .field-k{color:var(--mint-ink);margin-bottom:4px;display:block}

  .memo-block{
    margin:10px 0 4px;padding:12px 14px;background:rgba(255,255,255,.75);
    border-radius:var(--r-md);font-size:13.5px;line-height:1.7;color:var(--ink-soft);overflow-wrap:anywhere;
  }
  .memo-block .field-k{color:var(--ink);margin-bottom:4px;display:block}

  .addr-block{
    margin:12px 0 4px;padding:13px 14px 13px 16px;border-radius:var(--r-md);
    background:linear-gradient(to right, var(--harbor) 0 3px, rgba(58,107,120,.14) 3px 100%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.4);
  }
  .addr-block .field-k{margin-bottom:3px;color:var(--harbor-deep)}
  .addr-block .field-v{font-weight:600;margin-bottom:12px}
  .nav-btns{display:flex;gap:8px}
  .nav-btns a{
    flex:1;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;
    background:var(--harbor);color:#fff;border-radius:var(--r-sm);
    padding:10px 0;font-size:13.5px;font-weight:700;text-decoration:none;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.3);
  }
  .nav-btns a.alt{background:rgba(255,255,255,.55);color:var(--harbor-deep);border:1px solid rgba(255,255,255,.8)}
  .addr-note{
    display:flex;align-items:center;gap:5px;width:100%;text-align:left;
    font-size:11.5px;color:var(--ink-soft);font-weight:600;
    background:none;border:none;border-top:1px dashed rgba(15,35,38,.18);
    margin-top:14px;padding:12px 0 0;cursor:pointer;font-family:inherit;
  }
  .addr-note::before{content:"🔎";font-size:12px}
  .addr-note.copied{color:var(--ok)}
  .addr-note.copied::before{content:"✅"}

  /* ---------- Empty / error state ---------- */
  .state{
    border-radius:var(--r-lg);padding:26px 18px;text-align:center;
    color:var(--ink-soft);font-size:13.5px;line-height:1.7;
  }
  .state code,.state pre{
    display:block;background:rgba(255,255,255,.5);border-radius:var(--r-sm);text-align:left;
    padding:8px 10px;font-size:11px;word-break:break-all;white-space:pre-wrap;
    margin-top:10px;max-height:220px;overflow:auto;
  }
  .state .btn,.state .btn.ghost{margin:12px 4px 0}
  details.diag{margin-top:12px;text-align:left;font-size:12px}
  details.diag summary{cursor:pointer;color:var(--harbor-deep);font-weight:600}

  footer{
    max-width:720px;margin:22px auto 0;padding:0 14px 20px;
    font-size:11.5px;color:#DCE8E5;line-height:1.6;text-shadow:0 1px 6px rgba(0,0,0,.18);
  }
  footer a{color:#fff;font-weight:600}
  .ver{opacity:.75}
  @media (max-width:400px){.stat b{font-size:19px}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}body::before{animation:none}}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="eyebrow">Kaohsiung Open1999</div>
    <h1>前鎮區<span class="x">×</span>環保局</h1>
    <div class="sub">派工案件查詢．打開就是今天的結果</div>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-card">
    <div class="filter-label">篩選條件（點一下可開關）</div>
    <div class="filter-row">
      <button class="chip" id="chipDist" aria-pressed="true"><span class="dot"></span>前鎮區</button>
      <button class="chip" id="chipUnit" aria-pressed="true"><span class="dot"></span>環保局</button>
    </div>
    <div class="date-row">
      <input type="date" id="dateStart" aria-label="起始日期">
      <span class="tilde">～</span>
      <input type="date" id="dateEnd" aria-label="結束日期">
    </div>
    <div class="quick-row">
      <button class="quick" id="qToday">今天</button>
      <button class="quick" id="qYesterday">昨天起</button>
      <button class="quick" id="q7">近 7 天</button>
      <button class="quick" id="q30">近 30 天</button>
    </div>
    <button class="btn-search" id="btnQuery">🔍　查　詢</button>
    <div class="hint" id="hint">預設查詢當天；日期區間最長一年（資料來源限制）。</div>
  </div>
</div>

<div class="summary" id="summary" hidden>
  <div class="stat"><b id="stTotal">–</b><span>符合案件</span></div>
  <div class="stat doing"><b id="stDoing">–</b><span>處理中</span></div>
  <div class="stat ok"><b id="stDone">–</b><span>已結案</span></div>
</div>

<main>
  <div class="meta-line" id="metaLine"></div>
  <div id="list"></div>
</main>

<footer>
  資料來源：高雄市政府「Open1999 派工受理案件」開放資料。
  若需完整介面仍可前往 <a href="https://soweb.kcg.gov.tw/#/work" target="_blank" rel="noopener">官方查詢頁</a>。
  <span class="ver">｜版本 v25</span>
</footer>

<script>
const API_BASE = "https://soweb.kcg.gov.tw/open1999/ServiceRequestsQuery.asmx/ServiceRequestsQuery";
const listEl = document.getElementById("list");
const metaEl = document.getElementById("metaLine");
const sumEl  = document.getElementById("summary");
const hintEl = document.getElementById("hint");
const dStart = document.getElementById("dateStart");
const dEnd   = document.getElementById("dateEnd");
const chips  = {
  dist: document.getElementById("chipDist"),
  unit: document.getElementById("chipUnit"),
};
let allRows = [];
let lastRange = "";
let lastRawPreview = "";

// ---- 日期工具 ----
function toISO(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return y + "-" + m + "-" + dd;
}
function isoToApi(iso){ return iso.split("-").join(""); }
function setRange(daysBack){
  const end = new Date();
  const start = new Date();
  start.setDate(end.getDate() - daysBack);
  dStart.value = toISO(start);
  dEnd.value = toISO(end);
}
function validateRange(){
  if (!dStart.value || !dEnd.value) return "請選擇起始與結束日期。";
  if (dStart.value > dEnd.value) return "起始日期不能晚於結束日期。";
  const ms = new Date(dEnd.value) - new Date(dStart.value);
  if (ms > 366 * 24 * 60 * 60 * 1000) return "日期區間最長一年，請縮小範圍。";
  return "";
}

// ---- 顯示工具 ----
function badgeClass(status){
  const s = String(status || "");
  if (/結案|完成|已辦結|已完成|解除管制/.test(s)) return "ok";
  if (/處理|辦理|派工|列管|管制中|received/.test(s)) return "doing";
  return "other";
}
function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function fmtDate(v){
  if (!v) return "";
  const p2 = n => String(n).padStart(2,"0");
  let d = null;
  const m = String(v).match(/\/Date\((\d+)\)\//);
  if (m){
    d = new Date(Number(m[1]));
  } else {
    const parsed = new Date(String(v).replace(/-/g,"/"));
    if (!isNaN(parsed.getTime())) d = parsed;
  }
  if (!d) return String(v);
  return d.getFullYear() + "/" + p2(d.getMonth()+1) + "/" + p2(d.getDate()) +
    " " + p2(d.getHours()) + ":" + p2(d.getMinutes()) + ":" + p2(d.getSeconds());
}
function normKey(k){ return String(k).toLowerCase().replace(/[^a-z0-9]/g,""); }
function pick(row, keys){
  for (const k of keys){
    if (row[k] != null && String(row[k]) !== "") return row[k];
    const nk = normKey(k);
    const found = Object.keys(row).find(x => normKey(x) === nk);
    if (found && row[found] != null && String(row[found]) !== "") return row[found];
  }
  return "";
}
function rowText(r){ return Object.values(r).map(v=>String(v??"")).join("｜"); }

// 案件編號：A-IN-2026-145350 → 前段淡化、末段稍加強（登記常只用末段），整體維持小巧
function fmtCaseNo(no){
  const s = String(no || "");
  const m = s.match(/^(.*[-–—])(\d+)\s*$/);
  if (!m) return esc(s);
  return '<span class="cno-pre">' + esc(m[1]) + '</span>' +
         '<span class="cno-tail">' + esc(m[2]) + '</span>';
}

// ---- 回傳解析：支援 JSON / {d:...} / XML 包 JSON / 純 XML ----
function parseResponse(text){
  try{
    let data = JSON.parse(text);
    if (data && data.d) data = typeof data.d === "string" ? JSON.parse(data.d) : data.d;
    if (Array.isArray(data)) return data;
  }catch(e){}
  const m = text.match(/\[[\s\S]*\]/);
  if (m){
    try{
      const data = JSON.parse(
        m[0].replace(/&quot;/g,'"').replace(/&amp;/g,"&")
             .replace(/&lt;/g,"<").replace(/&gt;/g,">")
      );
      if (Array.isArray(data)) return data;
    }catch(e){}
  }
  try{
    const doc = new DOMParser().parseFromString(text, "text/xml");
    if (!doc.querySelector("parsererror")){
      const counts = {};
      doc.querySelectorAll("*").forEach(n=>{
        if (n.children.length > 0 && [...n.children].every(c=>c.children.length===0)){
          counts[n.tagName] = (counts[n.tagName]||0)+1;
        }
      });
      const rowTag = Object.keys(counts).sort((a,b)=>counts[b]-counts[a])[0];
      if (rowTag && counts[rowTag] >= 1){
        const rows = [...doc.getElementsByTagName(rowTag)].map(n=>{
          const o = {};
          [...n.children].forEach(c=>{ o[c.tagName] = c.textContent; });
          return o;
        });
        if (rows.length && Object.keys(rows[0]).length >= 3) return rows;
      }
    }
  }catch(e){}
  return null;
}

// ---- 篩選：欄位優先，欄位空白時退回整列文字搜尋 ----
// 前鎮區郵遞區號 806
function matchDist(r){
  const zip = String(pick(r,["ZipName","DistName"]));
  if (zip) return zip.includes("前鎮");
  const code = String(pick(r,["zipcode"]));
  if (code) return code.startsWith("806");
  return rowText(r).includes("前鎮");
}
function matchUnit(r){
  const unit = String(pick(r,["UnitName","ReplyUnit"]));
  if (unit) return unit.includes("環保") || unit.includes("環境保護");
  return rowText(r).includes("環保");
}

function applyFilters(){
  const useDist = chips.dist.getAttribute("aria-pressed") === "true";
  const useUnit = chips.unit.getAttribute("aria-pressed") === "true";
  const rows = allRows.filter(r=>{
    if (useDist && !matchDist(r)) return false;
    if (useUnit && !matchUnit(r)) return false;
    return true;
  });
  render(rows, useDist, useUnit);
}

function distinctSummary(keys, topN){
  const counts = {};
  allRows.forEach(r=>{
    const v = String(pick(r, keys)) || "（空白）";
    counts[v] = (counts[v]||0)+1;
  });
  return Object.entries(counts)
    .sort((a,b)=>b[1]-a[1])
    .slice(0, topN)
    .map(([k,v])=>k+"×"+v)
    .join("、");
}

function render(rows, useDist, useUnit){
  const labels = [];
  if (useDist) labels.push("前鎮區");
  if (useUnit) labels.push("環保局");
  metaEl.textContent =
    (labels.length ? "篩選：" + labels.join("＋") + "，" : "未套用篩選，") +
    "期間 " + lastRange + "，共 " + rows.length + " 筆（來源共 " + allRows.length + " 筆）";

  let doing = 0, done = 0;
  rows.forEach(r=>{
    const cls = badgeClass(pick(r,["StatusName","Status"]));
    if (cls === "doing") doing++;
    else if (cls === "ok") done++;
  });
  document.getElementById("stTotal").textContent = rows.length;
  document.getElementById("stDoing").textContent = doing;
  document.getElementById("stDone").textContent  = done;
  sumEl.hidden = false;

  if (!rows.length){
    let diag = "";
    if (allRows.length){
      let firstRow = "";
      try{ firstRow = JSON.stringify(allRows[0], null, 1).slice(0, 800); }catch(e){}
      diag = '<details class="diag"><summary>看看來源資料長怎樣（除錯用）</summary>' +
        '<div style="margin-top:6px">行政區欄位值：' + esc(distinctSummary(["ZipName","DistName"], 8)) + '</div>' +
        '<div style="margin-top:4px">郵遞區號欄位值：' + esc(distinctSummary(["zipcode"], 8)) + '</div>' +
        '<div style="margin-top:4px">機關欄位值：' + esc(distinctSummary(["UnitName","ReplyUnit"], 8)) + '</div>' +
        '<div style="margin-top:6px">第一筆完整內容：</div><pre>' + esc(firstRow) + '</pre>' +
        '</details>';
    }
    listEl.innerHTML = '<div class="state">' +
      (allRows.length
        ? '這段期間來源有 ' + allRows.length + ' 筆全市案件，但沒有符合「' + (labels.join("＋")||"目前篩選") + '」的。<br>前鎮區＋環保局單日常常是零筆，屬正常情況。'
        : '這段期間來源沒有回傳任何案件。開放資料的更新可能比官網慢半天到一天，<br>今天的案件常要等一段時間才會出現。') +
      '<br><button class="btn ghost" id="btnLoose">關閉篩選看全部</button>' +
      '<button class="btn ghost" id="btnWiden">改查近 7 天</button>' +
      diag + '</div>';
    const bl = document.getElementById("btnLoose");
    if (bl) bl.addEventListener("click", ()=>{
      chips.dist.setAttribute("aria-pressed","false");
      chips.unit.setAttribute("aria-pressed","false");
      applyFilters();
    });
    const bw = document.getElementById("btnWiden");
    if (bw) bw.addEventListener("click", ()=>{ setRange(7); load(); });
    return;
  }

  // 重新產生（正式版）：直接完整組裝，不用二段式
  listEl.innerHTML = rows.map((r, i)=>{
    const status = pick(r,["StatusName","Status"]);
    const cls = badgeClass(status);
    const no   = pick(r,["FileNo","Seq","CaseNo"]);
    const category = pick(r,["InformDesc"]);
    const content  = pick(r,["BeforeDesc"]);
    const memo = pick(r,["Memo"]);
    const desc = content || category;
    const addr = pick(r,["address","Address"]);
    const unit = pick(r,["UnitName","ReplyUnit"]);
    const zip  = pick(r,["ZipName","DistName"]);
    const date = fmtDate(pick(r,["CreDate","Cre_Date"]));
    const closeDate = fmtDate(pick(r,["CloseDate","Close_Date"]));
    const lat = parseFloat(pick(r,["Lat"]));
    const lng = parseFloat(pick(r,["Lng"]));
    const hasGeo = isFinite(lat) && isFinite(lng) && lat > 20 && lat < 26;
    const destEnc = hasGeo ? (lat + "," + lng)
      : encodeURIComponent("高雄市" + (zip||"") + (addr||""));
    const gNav = "https://www.google.com/maps/dir/?api=1&destination=" + destEnc + "&travelmode=driving";
    const aNav = hasGeo
      ? "https://maps.apple.com/?daddr=" + lat + "," + lng
      : "https://maps.apple.com/?daddr=" + destEnc;

    function field(label, val, full){
      if (!val) return "";
      return '<div class="field' + (full?' full':'') + '"><div class="field-k">' + label + '</div>' +
             '<div class="field-v">' + esc(val) + '</div></div>';
    }
    const metaBits = [zip, unit, addr].filter(Boolean).map(esc).map(t=>'<span>'+t+'</span>').join("");

    const addrHtml = (addr || hasGeo) ? (
      '<div class="addr-block">' +
        '<div class="field-k">反應地址</div>' +
        '<div class="field-v">' + esc(addr || (lat + ", " + lng)) + '</div>' +
        '<div class="nav-btns">' +
          '<a href="' + gNav + '" target="_blank" rel="noopener">🧭 Google 導航</a>' +
          '<a class="alt" href="' + aNav + '" target="_blank" rel="noopener">🍎 Apple 地圖</a>' +
        '</div>' +
        (addr ? '<button type="button" class="addr-note" data-caseno="' + esc((String(no||"").match(/(\d+)\s*$/)||[,""])[1]) + '">門牌號可能不完整，點此複製案號到官網核對</button>' : '') +
      '</div>'
    ) : "";

    const contentHtml = content ? (
      '<div class="quote-block"><span class="field-k">反應內容</span>' + esc(content) + '</div>'
    ) : "";

    const memoHtml = memo ? (
      '<div class="memo-block"><span class="field-k">備註</span>' + esc(memo) + '</div>'
    ) : "";

    const copyBtn = (function(){
      const numOnly = (String(no||"").match(/(\d+)\s*$/) || [,""])[1];
      const lines = [];
      if (numOnly) lines.push("案號：" + numOnly);
      if (date)    lines.push("反應時間：" + date);
      if (addr)    lines.push("反應地址：" + addr);
      if (content) lines.push("反應內容：" + content);
      const payload = lines.join("\n");
      return payload
        ? '<div class="copy-divider"></div><button class="copy-all" data-copy="' + esc(payload) + '">📋 一鍵複製案號／時間／地址／內容</button>'
        : "";
    })();

    return '<div class="case" data-idx="' + i + '">' +
      '<div class="case-head">' +
        '<span class="badge ' + cls + '">' + esc(status || "狀態不明") + '</span>' +
        '<span class="case-no">' + (no ? fmtCaseNo(no) : "") + '</span>' +
        '<span class="expand-btn">▾</span>' +
      '</div>' +
      '<div class="case-preview">' +
        (desc ? '<div class="desc">' + esc(desc) + '</div>' : '') +
        (metaBits ? '<div class="meta-row">' + metaBits + '</div>' : '') +
      '</div>' +
      '<div class="case-detail">' +
        '<div class="field-grid">' +
          field("案件編號", (no ? no.replace(/^.*[-–—](\d+)\s*$/, "#$1") : "")) +
          field("通報事項", category) +
          field("通報日期", date, true) +
          field("結案日期", closeDate, true) +
        '</div>' +
        contentHtml +
        addrHtml +
        memoHtml +
        copyBtn +
      '</div>' +
    '</div>';
  }).join("");

  // 點卡片展開／收合明細（點到連結或按鈕時不觸發）
  listEl.querySelectorAll(".case").forEach(el=>{
    el.addEventListener("click", (ev)=>{
      if (ev.target.closest("a") || ev.target.closest(".copy-all") || ev.target.closest(".addr-note")) return;
      el.classList.toggle("open");
    });
  });

  // 共用複製函式
  async function copyText(txt){
    try{
      await navigator.clipboard.writeText(txt);
    }catch(e){
      const ta = document.createElement("textarea");
      ta.value = txt; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy"); ta.remove();
    }
  }

  // 地址備註按鈕：複製案號＋開官網查詢頁，減少手動核對步驟
  listEl.querySelectorAll(".addr-note").forEach(el=>{
    el.addEventListener("click", async (ev)=>{
      ev.stopPropagation();
      const no = el.getAttribute("data-caseno");
      if (no) await copyText(no);
      window.open("https://soweb.kcg.gov.tw/#/work", "_blank", "noopener");
      const orig = el.textContent;
      el.textContent = "案號已複製，到官網關鍵字欄位貼上查詢";
      el.classList.add("copied");
      setTimeout(()=>{ el.textContent = orig; el.classList.remove("copied"); }, 2200);
    });
  });

  // 一鍵複製：案號＋反應時間＋維修地址＋反應內容
  listEl.querySelectorAll(".copy-all").forEach(el=>{
    el.addEventListener("click", async (ev)=>{
      ev.stopPropagation();
      await copyText(el.getAttribute("data-copy"));
      const orig = el.textContent;
      el.textContent = "✅ 已複製，可直接貼上"; el.classList.add("copied");
      setTimeout(()=>{ el.textContent = orig; el.classList.remove("copied"); }, 1500);
    });
  });
}

// ---- 載入 ----
async function load(){
  const err = validateRange();
  if (err){
    hintEl.textContent = err;
    hintEl.classList.add("err");
    return;
  }
  hintEl.textContent = "預設查詢當天；日期區間最長一年（資料來源限制）。";
  hintEl.classList.remove("err");

  const s = isoToApi(dStart.value);
  const e = isoToApi(dEnd.value);
  lastRange = dStart.value === dEnd.value
    ? dStart.value
    : dStart.value + " ～ " + dEnd.value;
  const url = API_BASE + "?startdate=" + s + "&enddate=" + e;

  listEl.innerHTML = '<div class="state">資料載入中…</div>';
  document.getElementById("btnQuery").disabled = true;
  try{
    const res = await fetch(url, {headers:{"Accept":"application/json"}, cache:"no-store"});
    const text = await res.text();
    lastRawPreview = text.slice(0, 400);
    if (!res.ok) throw new Error("HTTP " + res.status);

    const data = parseResponse(text);
    if (!data) throw new Error("無法解析回傳格式");

    allRows = data.sort((a,b)=>{
      const ta = String(pick(a,["CreDate","Cre_Date"])), tb = String(pick(b,["CreDate","Cre_Date"]));
      return tb.localeCompare(ta);
    });
    applyFilters();
  }catch(err2){
    console.error(err2);
    listEl.innerHTML = '<div class="state">' +
      '無法取得資料（' + esc(err2.message) + '）。<br>' +
      '可能是市府伺服器暫時無回應，或不允許跨網域讀取（CORS）。<br>' +
      '可以直接開這個網址確認資料服務是否正常：' +
      '<code>' + esc(url) + '</code>' +
      (lastRawPreview ? '<details class="diag"><summary>伺服器實際回傳的內容（除錯用）</summary><pre>' + esc(lastRawPreview) + '</pre></details>' : '') +
      '<br><button class="btn" onclick="load()">再試一次</button></div>';
    sumEl.hidden = true;
    metaEl.textContent = "";
  }finally{
    document.getElementById("btnQuery").disabled = false;
  }
}

// ---- 事件 ----
chips.dist.addEventListener("click", ()=>{ toggle(chips.dist); applyFilters(); });
chips.unit.addEventListener("click", ()=>{ toggle(chips.unit); applyFilters(); });
function toggle(el){
  el.setAttribute("aria-pressed", el.getAttribute("aria-pressed") === "true" ? "false" : "true");
}
document.getElementById("btnQuery").addEventListener("click", load);
document.getElementById("qToday").addEventListener("click", ()=>{ setRange(0); load(); });
document.getElementById("qYesterday").addEventListener("click", ()=>{ setRange(1); load(); });
document.getElementById("q7").addEventListener("click", ()=>{ setRange(7); load(); });
document.getElementById("q30").addEventListener("click", ()=>{ setRange(30); load(); });
dStart.addEventListener("change", ()=>{ hintEl.classList.remove("err"); });
dEnd.addEventListener("change", ()=>{ hintEl.classList.remove("err"); });

// 預設：當天
setRange(0);
load();
</script>
